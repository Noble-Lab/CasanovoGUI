name: Cleanup PR build tags

# build.yml attaches PR test builds to a prerelease tagged pr-build-<N> (created on a PR
# labelled 'build-artifact'). When that PR closes, remove the prerelease and its tag so they
# do not accumulate.
on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    if: contains(github.event.pull_request.labels.*.name, 'build-artifact')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # delete releases and tags
    steps:
      - name: Delete pr-build prerelease and tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `pr-build-${context.issue.number}`;
            // Delete the prerelease first (deleting a release does not remove its tag).
            try {
              const rel = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner, repo: context.repo.repo, tag,
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner, repo: context.repo.repo, release_id: rel.data.id,
              });
              console.log(`Deleted prerelease ${tag}`);
            } catch (e) {
              console.log(`No prerelease for ${tag} (${e.status || e.message})`);
            }
            // Then delete the tag ref.
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${tag}`,
              });
              console.log(`Deleted tag ${tag}`);
            } catch (e) {
              console.log(`No tag ${tag} (${e.status || e.message})`);
            }
