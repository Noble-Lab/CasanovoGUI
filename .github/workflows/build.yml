name: build

# Build the cross-platform portable JAR and per-OS native app images.
# jpackage can only target the OS it runs on, so each native package is built on
# its own runner. Runs on version tags (v*) and on demand.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # One portable JAR that runs on Windows, Linux and macOS Apple Silicon (JDK 23+ to run; built on 25).
  portable-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build portable JAR
        run: mvn -B -Pportable -DskipTests clean package
      - uses: actions/upload-artifact@v4
        with:
          name: casanovo-gui-portable-jar
          path: |
            target/casanovo-gui-*.jar
            !target/original-*.jar
            !target/*-shaded.jar

  # Native app images / installers, one per OS (and per macOS architecture).
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, name: windows }
          - { os: ubuntu-latest,  name: linux }
          - { os: macos-13,       name: macos-intel }   # x86_64
          - { os: macos-14,       name: macos-arm }     # Apple Silicon
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot binutils

      - name: Package (Windows, app-image)
        if: runner.os == 'Windows'
        run: pwsh ./package.ps1

      - name: Package (Linux, app-image + .deb)
        if: runner.os == 'Linux'
        run: bash ./package.sh --installer

      - name: Package (macOS, app-image + .dmg)
        if: runner.os == 'macOS'
        run: bash ./package.sh --installer

      - uses: actions/upload-artifact@v4
        with:
          name: casanovo-gui-${{ matrix.name }}
          path: dist/**
          if-no-files-found: error
